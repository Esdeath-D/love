<script>
    // Проверка: запущен ли скрипт в Telegram или в обычном браузере
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

    if (tg) {
        tg.expand(); // Разворачиваем, если мы в ТГ
    }

    const output = document.getElementById('output');
    const runBtn = document.getElementById('runBtn');

    const codeLines = [
        "> Initializing system...",
        "> Loading emotional_modules.lib...",
        "> Connection to Ulan-Ude established.",
        "> Executing loop...",
        "while (day === 'today') {",
        "  girl.happiness += 100;",
        "  girl.smile = true;",
        "  sendVirtualHug();",
        "}",
        "> STATUS: SUCCESS <span class='heart'>❤</span>"
    ];

    async function runScript() {
        runBtn.style.display = 'none';
        for (let line of codeLines) {
            const div = document.createElement('div');
            div.className = 'line';
            div.innerHTML = line;
            div.style.opacity = 1;
            output.appendChild(div);
            await new Promise(r => setTimeout(r, 600)); 
        }

        // Запуск сердечек (конфетти)
        const duration = 3 * 1000;
        const end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#ff4b2b', '#ff416c']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#ff4b2b', '#ff416c']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
        
        // Показываем уведомление через 3.5 секунды
        setTimeout(() => {
            const message = "Скрипт выполнен. Теперь ты обязана улыбнуться! Подтверждаешь?";
            if (tg && tg.showConfirm) {
                tg.showConfirm(message);
            } else {
                alert(message); // Обычное окно, если открыто в браузере
            }
        }, 3500);
    }

    runBtn.onclick = runScript;
</script>
