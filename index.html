<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Script</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #00ff41; /* Цвет терминала Matrix */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #console {
            width: 90%;
            max-width: 400px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            min-height: 200px;
        }
        .line { margin-bottom: 5px; opacity: 0; }
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        button {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }
        button:hover { background: #00ff41; color: #000; }
        .heart { color: #ff4b2b; }
    </style>
</head>
<body>

<div id="console">
    <div id="output"></div>
    <span class="cursor">_</span>
</div>

<button id="runBtn">RUN morning_script.js</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран

    const output = document.getElementById('output');
    const runBtn = document.getElementById('runBtn');

    const codeLines = [
        "> Initializing system...",
        "> Loading emotional_modules.lib...",
        "> Connection to Ulan-Ude established.",
        "> Executing loop...",
        "while (day === 'today') {",
        "  girl.happiness += 100;",
        "  girl.smile = true;",
        "  sendVirtualHug();",
        "}",
        "> STATUS: SUCCESS <span class='heart'>❤</span>"
    ];

    async function runScript() {
        runBtn.style.display = 'none';
        for (let line of codeLines) {
            const div = document.createElement('div');
            div.className = 'line';
            div.innerHTML = line;
            div.style.opacity = 1;
            output.appendChild(div);
            await new Promise(r => setTimeout(r, 600)); // Задержка для эффекта печати
        }

        // Запуск сердечек
        const duration = 3 * 10
