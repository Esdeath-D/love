<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff5f5 0%, #f0f4f8 100%);
            font-family: 'Comfortaa', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #mainCard {
            width: 85%;
            max-width: 350px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
        }
        h1 { font-size: 20px; color: #444; margin-bottom: 25px; transition: opacity 0.5s; }
        
        .status-container { text-align: left; min-height: 160px; margin-bottom: 10px; }
        
        .status-line {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(20px); 
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .status-line.visible { opacity: 1; transform: translateY(0); }

        .icon { font-size: 22px; margin-right: 15px; }

        #startBtn {
            background: #ff7eb3;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 126, 179, 0.4);
            transition: 0.3s;
        }

        /* Стиль для финального текста */
        #finalMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 100%;
            font-size: 26px;
            font-weight: bold;
            color: #ff4b6b;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #finalMessage.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

<div id="mainCard">
    <h1 id="title">Твой утренний запуск 🚀</h1>
    
    <div class="status-container" id="statusDisplay">
        <div class="status-line" id="s1"><span class="icon">✨</span> Настройка настроения...</div>
        <div class="status-line" id="s2"><span class="icon">📍</span> Связь с Улан-Удэ...</div>
        <div class="status-line" id="s3"><span class="icon">😊</span> Проверка улыбки: OK!</div>
        <div class="status-line" id="s4"><span class="icon">💖</span> Обнимашки отправлены!</div>
    </div>

    <div id="finalMessage">Доброе утро, любимая! ❤️</div>
    
    <button id="startBtn">НАЧАТЬ</button>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    const btn = document.getElementById('startBtn');
    const title = document.getElementById('title');
    const statusBox = document.getElementById('statusDisplay');
    const finalMsg = document.getElementById('finalMessage');
    
    async function start() {
        btn.style.display = 'none';
        
        // Поочередно выводим статусы
        for (let i = 1; i <= 4; i++) {
            await new Promise(r => setTimeout(r, 800));
            document.getElementById('s' + i).classList.add('visible');
        }

        await new Promise(r => setTimeout(r, 1000));

        // Скрываем старое, показываем новое
        statusBox.style.opacity = '0';
        title.style.opacity = '0';
        
        setTimeout(() => {
            statusBox.style.display = 'none';
            title.style.display = 'none';
            finalMsg.classList.add('show');
            
            // Массивный салют из сердечек!
            const end = Date.now() + 3000;
            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff7eb3', '#ff4b6b'],
                    shapes: ['text'],
                    shapeOptions: { text: { value: ['❤️','💖'] } }
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff7eb3', '#ff4b6b'],
                    shapes: ['text'],
                    shapeOptions: { text: { value: ['❤️','💖'] } }
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }, 500);

        setTimeout(() => {
            const msg = "Все системы работают на 100%. Желаю тебе самого чудесного дня! 😊";
            if (tg?.showConfirm) tg.showConfirm(msg); else alert(msg);
        }, 4500);
    }

    btn.onclick = start;
</script>
</body>
</html>
